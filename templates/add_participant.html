<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати учасника</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            padding: 30px 20px;
        }

        .wrap {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(0,0,0,.06);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, .form-input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            border: none;
            background: #16a34a;
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        a {
            margin-left: 10px;
            color: #2563eb;
            text-decoration: none;
        }

        .field-errors {
            color: #b00020;
            font-size: 14px;
            margin: -6px 0 10px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Додати учасника до команди "{{ team.name }}"</h1>

            <form method="post">
                {% csrf_token %}

                <label>***?? *??</label>
                {{ form.full_name }}
                {% if form.full_name.errors %}
                    <div class="field-errors">{{ form.full_name.errors }}</div>
                {% endif %}

                <label>***?? *??</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <div class="field-errors">{{ form.email.errors }}</div>
                {% endif %}

                <button type="submit">Додати</button>
                <a href="/team/{{ team.id }}/">Назад</a>
            </form>
        </div>
    </div>
</body>
</html>
