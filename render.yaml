# Render Blueprint — Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: tournament-db
    plan: free
    databaseName: tournament_platform
    user: tournament_user

services:
  - type: web
    name: tournament-platform
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tournament-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
